name: Builds

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install OBS Studio
        run: |
          $obsDll = 'C:\Program Files\obs-studio\bin\64bit\obs.dll'
          if (Test-Path $obsDll) {
            Write-Host 'OBS Studio is already installed.'
          } elseif (Get-Command choco -ErrorAction SilentlyContinue) {
            choco install obs-studio --no-progress -y
          } elseif (Get-Command winget -ErrorAction SilentlyContinue) {
            winget install --id OBSProject.OBSStudio --exact --source winget --accept-package-agreements --accept-source-agreements --silent
          } else {
            $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/obsproject/obs-studio/releases/latest'
            $asset = $release.assets | Where-Object { $_.name -match 'Windows.*Installer.*\.exe$' } | Select-Object -First 1
            if (-not $asset) {
              throw 'Could not find an OBS Studio Windows installer asset in the latest release.'
            }

            $installer = Join-Path $env:RUNNER_TEMP 'OBS-Studio-Installer.exe'
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $installer
            Start-Process -FilePath $installer -ArgumentList '/S' -Wait
          }

          if (-not (Test-Path $obsDll)) {
            throw 'obs.dll was not found after OBS Studio installation.'
          }

      - name: Configure fallback build
        run: cmake -S . -B build-win-fallback-vs

      - name: Build release plugin
        run: cmake --build build-win-fallback-vs --config Release

      - name: Package release layout
        run: .\package-release.ps1 -Configuration Release -BuildDir build-win-fallback-vs -Platform windows -NoZip

      - name: Upload Windows package
        uses: actions/upload-artifact@v6
        with:
          name: MotionPngTuberPlayer-windows
          path: dist/MotionPngTuberPlayer-windows
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-linux-stub:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libobs-dev
          pkg-config --modversion libobs

      - name: Configure and build Linux stub plugin
        run: bash ./ci/build-nonwindows-stub.sh build-linux-stub

      - name: Package Linux stub layout
        shell: pwsh
        run: .\package-release.ps1 -Configuration Release -BuildDir build-linux-stub -Platform linux -NoZip

      - name: Upload Linux stub package
        uses: actions/upload-artifact@v6
        with:
          name: MotionPngTuberPlayer-linux
          path: dist/MotionPngTuberPlayer-linux
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-macos-stub:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install macOS build tools
        run: |
          brew install cmake ninja pkgconf

      - name: Detect macOS libobs
        id: libobs
        run: |
          if pkg-config --exists libobs; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Using libobs $(pkg-config --modversion libobs)"
          else
            echo "::warning::libobs was not found on the hosted macOS runner. Expose an OBS/libobs development install through PKG_CONFIG_PATH, OBS_PREFIX, or libobs_DIR to enable the macOS stub build."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure and build macOS stub plugin
        if: steps.libobs.outputs.available == 'true'
        run: bash ./ci/build-nonwindows-stub.sh build-macos-stub

      - name: Package macOS stub layout
        if: steps.libobs.outputs.available == 'true'
        shell: pwsh
        run: ./package-release.ps1 -Configuration Release -BuildDir build-macos-stub -Platform macos -NoZip

      - name: Upload macOS stub package
        if: steps.libobs.outputs.available == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: MotionPngTuberPlayer-macos
          path: dist/MotionPngTuberPlayer-macos
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux-stub
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Create release archives
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          mkdir -p release
          (
            cd release-artifacts/MotionPngTuberPlayer-windows
            zip -rq ../../release/MotionPngTuberPlayer-windows.zip .
          )
          (
            cd release-artifacts/MotionPngTuberPlayer-linux
            zip -rq ../../release/MotionPngTuberPlayer-linux.zip .
          )
          sha256sum release/MotionPngTuberPlayer-windows.zip release/MotionPngTuberPlayer-linux.zip > release/SHA256SUMS.txt

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes='Windows package is the primary supported artifact. Linux package is currently a stub-build artifact. macOS build scaffolding exists in the repository, but hosted CI release packaging is not wired yet.'
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "release/MotionPngTuberPlayer-windows.zip#MotionPngTuberPlayer Windows package" \
              "release/MotionPngTuberPlayer-linux.zip#MotionPngTuberPlayer Linux stub package" \
              "release/SHA256SUMS.txt#SHA256 checksums" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "release/MotionPngTuberPlayer-windows.zip#MotionPngTuberPlayer Windows package" \
              "release/MotionPngTuberPlayer-linux.zip#MotionPngTuberPlayer Linux stub package" \
              "release/SHA256SUMS.txt#SHA256 checksums" \
              --title "MotionPngTuberPlayer ${GITHUB_REF_NAME}" \
              --generate-notes \
              --notes "${notes}" \
              --prerelease
          fi
