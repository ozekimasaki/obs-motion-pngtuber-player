name: Builds

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  WINDOWS_PACKAGE_NAME: MotionPngTuberPlayer-obs-plugin-windows-x64
  LINUX_PACKAGE_NAME: MotionPngTuberPlayer-obs-plugin-linux-x64-stub
  MACOS_PACKAGE_NAME: MotionPngTuberPlayer-obs-plugin-macos-arm64-stub
  CHECKSUMS_NAME: MotionPngTuberPlayer-release-checksums.txt

jobs:
  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install OBS Studio
        run: |
          $obsDll = 'C:\Program Files\obs-studio\bin\64bit\obs.dll'
          if (Test-Path $obsDll) {
            Write-Host 'OBS Studio is already installed.'
          } elseif (Get-Command choco -ErrorAction SilentlyContinue) {
            choco install obs-studio --no-progress -y
          } elseif (Get-Command winget -ErrorAction SilentlyContinue) {
            winget install --id OBSProject.OBSStudio --exact --source winget --accept-package-agreements --accept-source-agreements --silent
          } else {
            $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/obsproject/obs-studio/releases/latest'
            $asset = $release.assets | Where-Object { $_.name -match 'Windows.*Installer.*\.exe$' } | Select-Object -First 1
            if (-not $asset) {
              throw 'Could not find an OBS Studio Windows installer asset in the latest release.'
            }

            $installer = Join-Path $env:RUNNER_TEMP 'OBS-Studio-Installer.exe'
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $installer
            Start-Process -FilePath $installer -ArgumentList '/S' -Wait
          }

          if (-not (Test-Path $obsDll)) {
            throw 'obs.dll was not found after OBS Studio installation.'
          }

      - name: Configure fallback build
        run: cmake -S . -B build-win-fallback-vs

      - name: Build release plugin
        run: cmake --build build-win-fallback-vs --config Release

      - name: Package release layout
        run: .\package-release.ps1 -Configuration Release -BuildDir build-win-fallback-vs -Platform windows -PackageName "${{ env.WINDOWS_PACKAGE_NAME }}" -NoZip

      - name: Upload Windows package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.WINDOWS_PACKAGE_NAME }}
          path: dist/${{ env.WINDOWS_PACKAGE_NAME }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-linux-stub:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libobs-dev
          pkg-config --modversion libobs

      - name: Configure and build Linux stub plugin
        run: bash ./ci/build-nonwindows-stub.sh build-linux-stub

      - name: Package Linux stub layout
        shell: pwsh
        run: .\package-release.ps1 -Configuration Release -BuildDir build-linux-stub -Platform linux -PackageName "${{ env.LINUX_PACKAGE_NAME }}" -NoZip

      - name: Upload Linux stub package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.LINUX_PACKAGE_NAME }}
          path: dist/${{ env.LINUX_PACKAGE_NAME }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-macos-stub:
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install macOS build tools
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          for formula in cmake ninja pkgconf; do
            if brew list --formula "${formula}" >/dev/null 2>&1; then
              echo "${formula} is already installed."
            else
              brew install "${formula}"
            fi
          done

          if brew list --cask obs >/dev/null 2>&1; then
            echo "obs is already installed."
          else
            brew install --cask obs
          fi

      - name: Detect macOS libobs framework
        id: macos_obs
        run: |
          obs_app_root="/Applications/OBS.app"
          if [[ ! -d "${obs_app_root}" ]]; then
            echo "::error::OBS.app was not found at ${obs_app_root} after installation."
            exit 1
          fi

          library_path=""
          for candidate in \
            "${obs_app_root}/Contents/Frameworks/libobs.framework/libobs" \
            "${obs_app_root}/Contents/Frameworks/libobs.framework/Versions/A/libobs" \
            "${obs_app_root}/Contents/Frameworks/libobs.0.dylib"; do
            if [[ -f "${candidate}" ]]; then
              library_path="${candidate}"
              break
            fi
          done

          if [[ -z "${library_path}" ]]; then
            echo "::error::Could not locate the libobs framework binary inside OBS.app."
            find "${obs_app_root}/Contents/Frameworks" -maxdepth 3 \( -name libobs -o -name 'libobs*.dylib' \) -print || true
            exit 1
          fi

          echo "library_path=${library_path}" >> "$GITHUB_OUTPUT"
          echo "Using macOS libobs at ${library_path}"

      - name: Configure and build macOS stub plugin
        env:
          MPT_MACOS_OBS_LIBRARY: ${{ steps.macos_obs.outputs.library_path }}
        run: bash ./ci/build-nonwindows-stub.sh build-macos-stub

      - name: Package macOS stub layout
        shell: pwsh
        run: ./package-release.ps1 -Configuration Release -BuildDir build-macos-stub -Platform macos -PackageName "${{ env.MACOS_PACKAGE_NAME }}" -NoZip

      - name: Upload macOS stub package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.MACOS_PACKAGE_NAME }}
          path: dist/${{ env.MACOS_PACKAGE_NAME }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux-stub
      - build-macos-stub
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Create release archives
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          mkdir -p release
          (
            cd "release-artifacts/${WINDOWS_PACKAGE_NAME}"
            zip -rq "../../release/${WINDOWS_PACKAGE_NAME}.zip" .
          )
          (
            cd "release-artifacts/${LINUX_PACKAGE_NAME}"
            zip -rq "../../release/${LINUX_PACKAGE_NAME}.zip" .
          )
          (
            cd "release-artifacts/${MACOS_PACKAGE_NAME}"
            zip -rq "../../release/${MACOS_PACKAGE_NAME}.zip" .
          )
          sha256sum \
            "release/${WINDOWS_PACKAGE_NAME}.zip" \
            "release/${LINUX_PACKAGE_NAME}.zip" \
            "release/${MACOS_PACKAGE_NAME}.zip" > "release/${CHECKSUMS_NAME}"

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes='Windows package is the primary supported artifact. Linux and macOS packages are currently stub-build release artifacts generated by GitHub Actions.'
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              "release/${WINDOWS_PACKAGE_NAME}.zip#MotionPngTuberPlayer Windows x64 package" \
              "release/${LINUX_PACKAGE_NAME}.zip#MotionPngTuberPlayer Linux x64 stub package" \
              "release/${MACOS_PACKAGE_NAME}.zip#MotionPngTuberPlayer macOS arm64 stub package" \
              "release/${CHECKSUMS_NAME}#SHA256 checksums" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              "release/${WINDOWS_PACKAGE_NAME}.zip#MotionPngTuberPlayer Windows x64 package" \
              "release/${LINUX_PACKAGE_NAME}.zip#MotionPngTuberPlayer Linux x64 stub package" \
              "release/${MACOS_PACKAGE_NAME}.zip#MotionPngTuberPlayer macOS arm64 stub package" \
              "release/${CHECKSUMS_NAME}#SHA256 checksums" \
              --title "MotionPngTuberPlayer ${GITHUB_REF_NAME}" \
              --generate-notes \
              --notes "${notes}" \
              --prerelease
          fi
